spring:
  application:
    name: pingboard
  datasource:
    url: jdbc:h2:mem:pingboard;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  threads:
    virtual:
      enabled: true

logging:
  file:
    name: ${PINGBOARD_LOG_FILE:./runtime/logs/pingboard.log}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: pingboard

pingboard:
  checker:
    connect-timeout: 3s
    read-timeout: 5s
    scheduler-delay: 30s
  alerts:
    enabled: ${PINGBOARD_ALERTS_ENABLED:false}
    provider: ${PINGBOARD_ALERTS_PROVIDER:DISCORD}
    webhook-url: ${PINGBOARD_ALERTS_WEBHOOK_URL:}
    failure-threshold: ${PINGBOARD_ALERTS_FAILURE_THRESHOLD:3}
    app-base-url: ${PINGBOARD_APP_BASE_URL:http://localhost:8080}
  security:
    operator:
      username: ${PINGBOARD_OPERATOR_USERNAME:operator}
      password: ${PINGBOARD_OPERATOR_PASSWORD:pingboard123!}
      role: ${PINGBOARD_OPERATOR_ROLE:OPERATOR}

sentry:
  traces-sample-rate: 1.0

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/pingboard
    driver-class-name: org.postgresql.Driver
    username: pingboard
    password: pingboard

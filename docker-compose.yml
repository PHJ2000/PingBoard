services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pingboard
      POSTGRES_USER: pingboard
      POSTGRES_PASSWORD: pingboard
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pingboard:
    build:
      context: .
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pingboard
      SPRING_DATASOURCE_USERNAME: pingboard
      SPRING_DATASOURCE_PASSWORD: pingboard
      SENTRY_DSN: ${SENTRY_DSN:-}
      PINGBOARD_ALERTS_ENABLED: ${PINGBOARD_ALERTS_ENABLED:-false}
      PINGBOARD_ALERTS_PROVIDER: ${PINGBOARD_ALERTS_PROVIDER:-DISCORD}
      PINGBOARD_ALERTS_WEBHOOK_URL: ${PINGBOARD_ALERTS_WEBHOOK_URL:-}
      PINGBOARD_ALERTS_FAILURE_THRESHOLD: ${PINGBOARD_ALERTS_FAILURE_THRESHOLD:-3}
      PINGBOARD_APP_BASE_URL: ${PINGBOARD_APP_BASE_URL:-http://localhost:8080}
      PINGBOARD_OPERATOR_USERNAME: ${PINGBOARD_OPERATOR_USERNAME:-operator}
      PINGBOARD_OPERATOR_PASSWORD: ${PINGBOARD_OPERATOR_PASSWORD:-pingboard123!}
      PINGBOARD_OPERATOR_ROLE: ${PINGBOARD_OPERATOR_ROLE:-OPERATOR}
      PINGBOARD_LOG_FILE: /var/log/pingboard/pingboard.log
    ports:
      - "8080:8080"
    volumes:
      - pingboard-logs:/var/log/pingboard

  prometheus:
    image: prom/prometheus:v3.4.1
    depends_on:
      - pingboard
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro

  loki:
    image: grafana/loki:3.5.3
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro

  promtail:
    image: grafana/promtail:3.5.3
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    volumes:
      - pingboard-logs:/var/log/pingboard:ro
      - ./promtail/config.yml:/etc/promtail/config.yml:ro

  grafana:
    image: grafana/grafana:12.2.0
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres-data:
  grafana-data:
  pingboard-logs:
